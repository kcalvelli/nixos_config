name: "Build Systems"

on:
  push:
    branches: [ master ]
    paths: ['**/*.nix', 'flake.nix', 'flake.lock']
  workflow_dispatch:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: "Build all hosts (x86_64-linux)"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: wimpysworld/nothing-but-nix@main

      - uses: DeterminateSystems/nix-installer-action@main
        with:
          determinate: true
          
      - uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Build configurations
        run: |
          nix build .#nixosConfigurations.edge.config.system.build.toplevel -L
          nix build .#nixosConfigurations.pangolin.config.system.build.toplevel -L

      - name: Push to FlakeHub (with outputs)
        uses: DeterminateSystems/flakehub-push@main
        with:
          name: kcalvelli/nixos_config
          visibility: public
          rolling: true
          include-output-paths: true
