name: "Build Systems"

on:
  push:
    branches: [ master ]
    paths: ['**/*.nix', 'flake.nix', 'flake.lock']
  workflow_dispatch:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: "Build all hosts (x86_64-linux)"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: wimpysworld/nothing-but-nix@main

      - uses: DeterminateSystems/nix-installer-action@main
        with:
          determinate: true 
               
      - uses: DeterminateSystems/flakehub-cache-action@main

      - run: nix build .#nixosConfigurations.edge.config.system.build.toplevel
      - run: nix build .#nixosConfigurations.pangolin.config.system.build.toplevel

      - name: Push to FlakeHub
        uses: DeterminateSystems/flakehub-push@main
        with:
          name: kcalvelli/nixos_config
          visibility: public
          rolling: true
          include-output-paths: true
