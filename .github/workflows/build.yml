name: "Build Systems"

on:
  push:
    branches: [ master ]
    paths: ['**/*.nix', 'flake.nix', 'flake.lock']
  workflow_dispatch:

env:
  NIX_TARGET: config.system.build.toplevel

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            arch: x86_64-linux
            host: edge
          - os: ubuntu-latest
            arch: x86_64-linux
            host: pangolin
    name: "Build ${{ matrix.host }} (${{ matrix.arch }})"
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v5
      - if: runner.os == 'Linux'
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/flakehub-cache-action@main

      - name: Run Build
        run: nix build .#nixosConfigurations.${{ matrix.host }}."$NIX_TARGET"

      - uses: DeterminateSystems/flakehub-push@main
        with:
          visibility: "private"
          name: "kcalvelli/nixos_config"
          rolling: "true"
          include-output-paths: true
