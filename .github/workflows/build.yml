name: "Build Systems"

on:
  push:
    branches: [ master ]
    paths: ['**/*.nix', 'flake.nix', 'flake.lock']
  workflow_dispatch:

env:
  NIX_TARGET: config.system.build.toplevel

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: "Build all hosts (x86_64-linux)"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - if: runner.os == 'Linux'
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - uses: DeterminateSystems/nix-installer-action@main
        with:
          determinate: true      
      - uses: DeterminateSystems/flakehub-cache-action@main
      - name: Build hosts
        run: |
          set -euo pipefail
          for host in edge pangolin; do
            nix build ".#nixosConfigurations.${host}.${NIX_TARGET}" --out-link "result-${host}"
          done
      - name: Push to FlakeHub
        uses: DeterminateSystems/flakehub-push@main
        with:
          name: kcalvelli/nixos_config
          visibility: public
          rolling: true
          include-output-paths: true
          output-paths: |
            result-edge
            result-pangolin
