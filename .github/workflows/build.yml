name: "Build Systems"

on:
  push:
    branches: [ master ]
    paths: ['**/*.nix', 'flake.nix', 'flake.lock']
  workflow_dispatch:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: "Build all hosts (x86_64-linux)"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: wimpysworld/nothing-but-nix@main

      - uses: DeterminateSystems/nix-installer-action@main
        with:
          determinate: true 

      - name: Build edge configuration
        run: |
          nix build .#nixosConfigurations.edge.config.system.build.toplevel --print-out-paths

      - name: Build pangolin configuration
        run: |
          nix build .#nixosConfigurations.pangolin.config.system.build.toplevel --print-out-paths

      - name: Push to FlakeHub
        uses: DeterminateSystems/flakehub-push@main
        with:
          name: kcalvelli/nixos_config
          visibility: public
          rolling: true
          include-output-paths: true
          
      - name: Copy closures to FlakeHub cache
        run: |
          # Force realise the paths locally first
          nix build --no-link .#nixosConfigurations.edge.config.system.build.toplevel
          nix build --no-link .#nixosConfigurations.pangolin.config.system.build.toplevel
          
          # Get the actual store paths
          EDGE_PATH=$(nix eval --raw .#nixosConfigurations.edge.config.system.build.toplevel)
          PANGOLIN_PATH=$(nix eval --raw .#nixosConfigurations.pangolin.config.system.build.toplevel)
          
          echo "Copying edge: $EDGE_PATH"
          echo "Copying pangolin: $PANGOLIN_PATH"
          
          # Copy with dependencies
          nix copy --to https://cache.flakehub.com "$EDGE_PATH" --verbose
          nix copy --to https://cache.flakehub.com "$PANGOLIN_PATH" --verbose
